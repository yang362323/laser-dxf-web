services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ITD_REF: main
    image: laser-dxf-web:1.0.0
    container_name: laser-dxf-web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
