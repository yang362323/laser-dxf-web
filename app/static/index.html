<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="激光DXF">
<link rel="manifest" href="/manifest.json">
<title>激光 DXF 转换</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0a0a0a;color:#eee;min-height:100dvh;display:flex;flex-direction:column;align-items:center}
  .header{padding:24px 16px 8px;text-align:center}
  .header h1{font-size:22px;font-weight:700;letter-spacing:-.5px}
  .header p{font-size:13px;color:#888;margin-top:4px}

  .upload-zone{width:calc(100% - 32px);max-width:400px;margin:16px;border:2px dashed #333;border-radius:16px;padding:48px 24px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;touch-action:manipulation}
  .upload-zone:hover,.upload-zone:active{border-color:#4fc3f7;background:#111}
  .upload-zone.dragover{border-color:#4fc3f7;background:#111}
  .upload-zone .icon{font-size:48px;margin-bottom:12px}
  .upload-zone .label{font-size:15px;font-weight:600}
  .upload-zone .hint{font-size:12px;color:#666;margin-top:6px}
  #file-input{display:none}

  .status{width:calc(100% - 32px);max-width:400px;margin:0 16px 16px;text-align:center;font-size:14px;color:#888}
  .status.error{color:#ef5350}
  .status.success{color:#66bb6a}

  .result{width:calc(100% - 32px);max-width:400px;margin:0 16px 24px;display:none;flex-direction:column;gap:12px}
  .result.show{display:flex}
  .result .info{font-size:13px;color:#aaa;text-align:center}
  .result img{width:100%;border-radius:12px;background:#000;display:block}

  .actions{display:flex;gap:10px}
  .btn{flex:1;padding:14px 12px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;touch-action:manipulation;transition:opacity .2s}
  .btn:active{opacity:.7}
  .btn-download{background:#4fc3f7;color:#000}
  .btn-share{background:#25d366;color:#fff}
  .btn-retry{background:#333;color:#eee}

  .spinner{display:none;width:32px;height:32px;border:3px solid #333;border-top-color:#4fc3f7;border-radius:50%;animation:spin .8s linear infinite;margin:16px auto}
  .spinner.show{display:block}
  @keyframes spin{to{transform:rotate(360deg)}}

  .install-banner{display:none;width:calc(100% - 32px);max-width:400px;margin:0 16px 12px;padding:12px 16px;background:#1a1a1a;border-radius:12px;font-size:13px;color:#aaa;text-align:center;cursor:pointer}
  .install-banner.show{display:block}
</style>
</head>
<body>

<div class="header">
  <h1>&#x1F4A8; 激光 DXF 转换</h1>
  <p>上传图片 &rarr; AI 清理 &rarr; 下载 DXF</p>
</div>

<div id="install-banner" class="install-banner">&#x1F4E5; 添加到主屏幕，用起来像 App</div>

<div class="upload-zone" id="upload-zone">
  <div class="icon">&#x1F4C1;</div>
  <div class="label">点击上传或拖拽图片</div>
  <div class="hint">支持 JPG / PNG / WEBP</div>
</div>
<input type="file" id="file-input" accept="image/*">

<div class="spinner" id="spinner"></div>
<div class="status" id="status"></div>

<div class="result" id="result">
  <div class="info" id="result-info"></div>
  <img id="preview-img" alt="预览">
  <div class="actions">
    <a class="btn btn-download" id="btn-download" download>&#x2B07; 下载 DXF</a>
    <button class="btn btn-share" id="btn-share">&#x1F4E8; 微信分享</button>
  </div>
  <button class="btn btn-retry" id="btn-retry">&#x1F504; 再来一张</button>
</div>

<script>
const uploadZone = document.getElementById('upload-zone');
const fileInput = document.getElementById('file-input');
const spinner = document.getElementById('spinner');
const status = document.getElementById('status');
const result = document.getElementById('result');
const previewImg = document.getElementById('preview-img');
const resultInfo = document.getElementById('result-info');
const btnDownload = document.getElementById('btn-download');
const btnShare = document.getElementById('btn-share');
const btnRetry = document.getElementById('btn-retry');
const installBanner = document.getElementById('install-banner');

// ── upload ────────────────────────────────────────────────────
uploadZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', handleFile);
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('dragover'); handleFile({target:{files:e.dataTransfer.files}}); });

btnRetry.addEventListener('click', () => { result.classList.remove('show'); uploadZone.style.display = ''; status.textContent = ''; });

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) { showStatus('请选择图片文件', 'error'); return; }
  convert(file);
}

async function convert(file) {
  uploadZone.style.display = 'none';
  spinner.classList.add('show');
  result.classList.remove('show');
  status.textContent = '';
  try {
    const form = new FormData();
    form.append('file', file);
    const resp = await fetch('/api/convert', { method: 'POST', body: form });
    if (!resp.ok) { const d = await resp.json(); throw new Error(d.detail || '转换失败'); }
    const data = await resp.json();
    previewImg.src = data.preview_url;
    resultInfo.textContent = `转换成功 · ${data.shape_count} 个轮廓`;
    btnDownload.href = data.dxf_url;
    btnDownload.download = 'output.dxf';
    btnShare.onclick = () => shareFile(data);
    result.classList.add('show');
    status.textContent = '';
  } catch (err) {
    showStatus(err.message || '转换失败，请重试', 'error');
    uploadZone.style.display = '';
  } finally {
    spinner.classList.remove('show');
  }
}

function showStatus(msg, type) { status.textContent = msg; status.className = 'status ' + (type || ''); }

// ── share ──────────────────────────────────────────────────────
async function shareFile(data) {
  try {
    const dxfBlob = await fetch(data.dxf_url).then(r => r.blob());
    const file = new File([dxfBlob], 'output.dxf', { type: 'application/octet-stream' });
    if (navigator.share && navigator.canShare && navigator.canShare({files:[file]})) {
      await navigator.share({ files: [file], title: '激光 DXF' });
    } else if (navigator.share) {
      await navigator.share({ title: '激光 DXF', text: 'DXF 文件下载: ' + location.origin + data.dxf_url });
    } else {
      await navigator.clipboard.writeText(location.origin + data.dxf_url);
      showStatus('链接已复制，去微信粘贴即可', 'success');
    }
  } catch (err) {
    if (err.name !== 'AbortError') {
      await navigator.clipboard.writeText(location.origin + data.dxf_url);
      showStatus('链接已复制，去微信粘贴即可', 'success');
    }
  }
}

// ── install banner ───────────────────────────────────────────
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBanner.classList.add('show');
});
installBanner.addEventListener('click', () => {
  if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
  installBanner.classList.remove('show');
});
</script>

</body>
</html>
